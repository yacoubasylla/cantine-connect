spring:
  application:
    name: cantine-connect-backend

  profiles:
    active: dev

  # ── JPA / Hibernate ──────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ── Pagination par défaut ────────────────────────────────
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 50

# ── Serveur ───────────────────────────────────────────────
server:
  port: 8081

# ── Actuator (Health Check) ───────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

# ── JWT ───────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:cantine-connect-secret-key-dev-only-256bits-change-in-production!!}
  expiration-ms: 86400000  # 24 heures

# ── Logging ───────────────────────────────────────────────
logging:
  level:
    com.klem.cantine: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

---
# ════════════════════════════════════════════════════════════
# Profil : DEV (Docker Compose local)
# ════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/cantine_connect
    username: cantine_admin
    password: cantine_dev_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

---
# ════════════════════════════════════════════════════════════
# Profil : PROD (Variables d'environnement obligatoires)
# ════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.klem.cantine: INFO
    org.hibernate.SQL: WARN
