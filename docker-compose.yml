version: '3.8'

# ============================================================
# Cantine Connect — Environnement de Développement Local
# Usage : docker compose up -d
# pgAdmin : http://localhost:5050  (admin@cantine.local / admin)
# PostgreSQL : localhost:5432
# ============================================================

networks:
  cantine-network:
    driver: bridge

volumes:
  postgres_dev_data:
    driver: local
  pgadmin_data:
    driver: local

services:

  # ── Base de Données PostgreSQL 16 ──────────────────────────
  cantine-db:
    image: postgres:16-alpine
    container_name: cantine-db
    environment:
      POSTGRES_DB: cantine_connect
      POSTGRES_USER: cantine_admin
      POSTGRES_PASSWORD: cantine_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - cantine-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cantine_admin -d cantine_connect"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Interface Web pgAdmin (Visualisation de la BDD) ────────
  cantine-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cantine-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cantine.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - cantine-network
    depends_on:
      cantine-db:
        condition: service_healthy
    restart: unless-stopped
